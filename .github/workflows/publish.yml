name: publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build all cards
        run: npm run build:all

      - name: Verify bundles
        run: ./tools/publish-cards.sh --check

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cards-dist
          path: |
            cards/*/dist/**
            manifest.json
          retention-days: 30

      - name: Commit manifest on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ -n "$(git status --porcelain manifest.json)" ]; then
            git config user.name  "oikos-bot"
            git config user.email "bot@oikos.local"
            git add manifest.json
            git commit -m "chore: regenerate manifest [skip ci]"
            git push
          fi

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cards/*/dist/**
            manifest.json
          generate_release_notes: true
